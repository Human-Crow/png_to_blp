<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css" type="text/css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <title>Image Converter</title>
</head>
<body>
    <h1>Image Converter</h1>
    <p>Image to Blueprint</p>
    <p style="color: rgb(255, 110, 110); font-size: 13px;">Max size for sharing:&nbsp;&nbsp; &nbsp;&nbsp;78,600 Buildings</p>
    <p style="color: rgb(255, 110, 110); font-size: 13px;">Max size for opening:&nbsp; 999,999 Buildings</p>
    <br><br>

    <div class="custom-upload">
        <label for="imgInput" class="file-upload">Choose Image</label>
        <input type="file" accept="image/*" id="imgInput" style="display: none;">
        <img id="imagePreview" alt="Preview" style="margin-top:10px; min-width:50px; max-width:250px; display:none;" />
        <div id="fileNameDisplay">No file selected</div>
    </div>
    <br>

    <button id="convert">Convert</button>
    <p id="status">&nbsp;</p>
    <br/>

    <label>New Blueprint id:</label>
    <p id="txt_id"></p>
    <br>
    <a id="link"></a>
    <br><br><br><br><br><br>

    <script type="module" src="./script.js?v=1.0.4"></script>
</body>
</html>
